<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angle of Attack — Geometry Artillery Duel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a1a;display:flex;justify-content:center;align-items:center;
  min-height:100vh;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;
  user-select:none;-webkit-user-select:none;
}
#app{
  position:relative;width:min(98vw,1100px);
  background:#1e2d24;border-radius:10px;
  box-shadow:0 0 50px rgba(0,0,0,.8);
  border:3px solid #3d5a3e;overflow:hidden;
}
canvas{display:block;width:100%;background:#1e2d24;cursor:crosshair}
/* Top bar */
#top-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 14px;background:rgba(0,0,0,.35);color:#d4d0b8;font-size:13px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
#top-bar .title{font-size:17px;font-weight:700;color:#f0e8c8;letter-spacing:1px}
#top-bar .turn-indicator{padding:3px 12px;border-radius:4px;font-size:13px;font-weight:600}
.turn-p1{background:rgba(100,180,255,.2);color:#64b4ff}
.turn-p2{background:rgba(255,100,100,.2);color:#ff6464}
#top-bar .turn-p1, #top-bar .turn-p2{font-size:13px;font-weight:600}
/* Controls */
#controls{
  display:flex;gap:12px;padding:8px 14px;
  background:rgba(0,0,0,.25);align-items:center;flex-wrap:wrap;
}
.ctrl-group{display:flex;align-items:center;gap:5px;color:#d4d0b8;font-size:13px}
.ctrl-group label{color:rgba(255,255,255,.4);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.ctrl-group input[type=range]{
  -webkit-appearance:none;width:90px;height:4px;
  background:rgba(255,255,255,.12);border-radius:2px;outline:none;
}
.ctrl-group input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:#f0e8c8;cursor:pointer;
}
.ctrl-group .value{min-width:36px;text-align:center;font-weight:700;font-size:14px}
#fire-btn{
  padding:6px 24px;border:2px solid #ff6b4a;
  background:rgba(255,107,74,.12);color:#ff6b4a;
  font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;border-radius:5px;transition:all .15s;letter-spacing:1px;
}
#fire-btn:hover{background:rgba(255,107,74,.25)}
#fire-btn:disabled{opacity:.3;cursor:not-allowed}
#new-game-btn{
  padding:5px 14px;border:1px solid rgba(255,255,255,.15);
  background:rgba(255,255,255,.06);color:#d4d0b8;
  font-family:inherit;font-size:12px;cursor:pointer;border-radius:4px;
}
#new-game-btn:hover{background:rgba(255,255,255,.12)}
#wind-display{color:rgba(255,255,255,.5);font-size:12px;margin-left:auto}
#wind-display .val{font-weight:700}
/* Result overlay */
#result{
  position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  background:rgba(0,0,0,.88);border:2px solid rgba(255,255,255,.1);
  border-radius:10px;padding:22px 30px;color:#d4d0b8;
  z-index:10;display:none;text-align:center;min-width:280px;
  backdrop-filter:blur(4px);
}
#result .r-title{font-size:22px;margin-bottom:6px}
#result .r-body{font-size:14px;margin-bottom:4px;line-height:1.5}
#result .r-proximity{font-size:13px;color:rgba(255,255,255,.4);margin-bottom:10px}
#result button{
  padding:6px 20px;border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08);color:#d4d0b8;
  font-family:inherit;font-size:13px;cursor:pointer;border-radius:4px;margin-top:4px;
}
#result button:hover{background:rgba(255,255,255,.15)}
/* Geometry sidebar */
#geo-help{
  position:absolute;bottom:55px;right:8px;z-index:5;
  padding:6px 10px;font-size:10px;color:rgba(255,255,255,.3);
  background:rgba(0,0,0,.3);border-radius:4px;border:none;
  font-family:inherit;cursor:pointer;display:none;
}
#geo-help:hover{color:rgba(255,255,255,.6)}
#geo-panel{
  position:absolute;bottom:55px;right:8px;z-index:6;
  background:rgba(0,0,0,.85);border:1px solid rgba(255,215,0,.2);
  border-radius:6px;padding:10px 14px;color:#d4d0b8;font-size:11px;
  display:none;min-width:180px;line-height:1.5;
}
#geo-panel .gp-title{color:#ffd700;font-size:12px;font-weight:600;margin-bottom:4px}
#geo-panel .gp-row{display:flex;justify-content:space-between;gap:10px}
#geo-panel .gp-label{color:rgba(255,255,255,.4)}
#geo-panel .gp-val{color:#87ceeb;font-weight:600}
#geo-panel button{
  margin-top:6px;padding:3px 10px;font-size:10px;
  border:1px solid rgba(255,215,0,.2);background:rgba(255,215,0,.08);
  color:#ffd700;font-family:inherit;cursor:pointer;border-radius:3px;width:100%;
}
/* Message */
#message{
  position:absolute;top:14%;left:50%;transform:translateX(-50%);
  color:#f0e8c8;font-size:15px;z-index:8;
  background:rgba(0,0,0,.6);padding:6px 16px;border-radius:5px;
  opacity:0;transition:opacity .3s;pointer-events:none;text-align:center;
}
/* History */
#history{
  position:absolute;top:38px;right:8px;z-index:5;
  background:rgba(0,0,0,.5);border-radius:5px;padding:6px 10px;
  color:#d4d0b8;font-size:11px;min-width:110px;display:none;text-align:right;
}
#history .hist-title{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.3);margin-bottom:2px}
#history .hist-entry{padding:1px 0;font-size:10px}
@media(max-width:600px){
  #controls{gap:6px;padding:6px 8px}
  .ctrl-group input[type=range]{width:55px}
  #fire-btn{padding:4px 14px;font-size:13px}
  #top-bar{padding:4px 8px;font-size:11px}
  #top-bar .title{font-size:14px}
  #result{min-width:240px;padding:16px 20px}
}
</style>
</head>
<body>

<div id="app">

  <!-- Top Bar -->
  <div id="top-bar">
    <span class="title">🎯 ANGLE OF ATTACK</span>
    <span id="turn-display" class="turn-p1">🔵 Player 1's Turn</span>
    <span id="score-display" style="font-size:12px;color:rgba(255,255,255,.3)">
      P1: <span id="p1-wins" style="color:#64b4ff">0</span>
      &nbsp;P2: <span id="p2-wins" style="color:#ff6464">0</span>
    </span>
  </div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Controls -->
  <div id="controls">
    <div class="ctrl-group">
      <label>Angle</label>
      <input type="range" id="angle-slider" min="1" max="89" value="45" step="0.5">
      <span class="value" id="angle-display" style="color:#87ceeb">45°</span>
    </div>
    <div class="ctrl-group">
      <label>Speed</label>
      <input type="range" id="speed-slider" min="10" max="100" value="50" step="1">
      <span class="value" id="speed-display" style="color:#87ceeb">50</span>
    </div>
    <button id="fire-btn">🔥 FIRE</button>
    <button id="new-game-btn">🔄 New Round</button>
    <span id="wind-display">💨 Wind: <span class="val" id="wind-val">0 →</span></span>
  </div>

  <!-- Result Overlay -->
  <div id="result">
    <div class="r-title" id="r-title">MISS</div>
    <div class="r-body" id="r-body"></div>
    <div class="r-proximity" id="r-prox"></div>
    <button id="r-ok-btn">OK</button>
  </div>

  <!-- Geometry Panel -->
  <button id="geo-help">📐 Geometry</button>
  <div id="geo-panel">
    <div class="gp-title">📐 Shot Analysis</div>
    <div class="gp-row"><span class="gp-label">Launched at:</span><span class="gp-val" id="gp-angle">45°</span></div>
    <div class="gp-row"><span class="gp-label">Launch speed:</span><span class="gp-val" id="gp-speed">50 m/s</span></div>
    <div class="gp-row"><span class="gp-label">Travel time:</span><span class="gp-val" id="gp-time">--</span></div>
    <div class="gp-row"><span class="gp-label">Max height:</span><span class="gp-val" id="gp-height">--</span></div>
    <div class="gp-row"><span class="gp-label">Range (flat):</span><span class="gp-val" id="gp-range">--</span></div>
    <div class="gp-row"><span class="gp-label">Distance to target:</span><span class="gp-val" id="gp-target-dist">--</span></div>
    <button id="gp-close-btn">Close</button>
  </div>

  <!-- History -->
  <div id="history">
    <div class="hist-title">Shot History</div>
    <div id="hist-entries"></div>
  </div>

  <!-- Message -->
  <div id="message"></div>

</div>

<script>
// ============================================================
// ANGLE OF ATTACK — Two-Player Artillery Duel
// ============================================================

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

// --- Dimensions ---
const W = 1100, H = 620;
canvas.width = W; canvas.height = H;

// --- Constants ---
const G = 9.81;
const PLAYER_RADIUS = 10;
const IMPACT_RADIUS = 18;

// --- State ---
let state = {
  phase: 'aiming', // aiming | firing | result | gameover
  currentPlayer: 1,
  p1: { x: 0, y: 0, angle: 45, speed: 50, lives: 3 },
  p2: { x: 0, y: 0, angle: 45, speed: 50, lives: 3 },
  terrain: [],
  wind: 0,
  shell: null,
  trail: [],
  history: [],
  round: 1,
  p1Wins: 0,
  p2Wins: 0,
  lastImpact: null,
  showGeo: false
};

// ============================================================
// TERRAIN GENERATION
// ============================================================
function generateTerrain() {
  const pts = [];
  const segments = 60;
  const step = W / segments;
  const baseY = H * 0.55;
  const amplitude = 80 + Math.random() * 60;

  // Start low on left side
  pts.push({ x: 0, y: baseY + 20 });

  // Generate mountain profile
  for (let i = 1; i < segments; i++) {
    const x = i * step;
    // Multiple sine waves for natural look
    const h1 = Math.sin(i * 0.12 + Math.random() * 0.3) * amplitude * 0.7;
    const h2 = Math.sin(i * 0.28 + Math.random() * 0.5) * amplitude * 0.4;
    const h3 = Math.sin(i * 0.05) * amplitude * 0.3;
    let y = baseY + h1 + h2 + h3;

    // Ensure edges are lower (player areas)
    const edgeFactor = Math.min(1, i / 8) * Math.min(1, (segments - i) / 8);
    y = y + (1 - edgeFactor) * 30;

    // Smooth transitions
    if (i > 0) {
      const prev = pts[pts.length - 1];
      const maxDelta = 25;
      y = Math.max(prev.y - maxDelta, Math.min(prev.y + maxDelta, y));
    }

    pts.push({ x, y: Math.max(H * 0.25, Math.min(H * 0.75, y)) });
  }

  // End low on right side
  pts.push({ x: W, y: baseY + 20 });

  state.terrain = pts;
}

function getTerrainY(x) {
  const pts = state.terrain;
  if (!pts || pts.length < 2) return H * 0.55;
  if (x <= pts[0].x) return pts[0].y;
  if (x >= pts[pts.length - 1].x) return pts[pts.length - 1].y;

  for (let i = 0; i < pts.length - 1; i++) {
    if (x >= pts[i].x && x < pts[i + 1].x) {
      const t = (x - pts[i].x) / (pts[i + 1].x - pts[i].x);
      return pts[i].y + (pts[i + 1].y - pts[i].y) * t;
    }
  }
  return pts[pts.length - 1].y;
}

function placePlayers() {
  // P1 on left third, P2 on right third
  const p1x = 60 + Math.random() * (W * 0.32 - 120);
  const p2x = W * 0.68 + Math.random() * (W * 0.32 - 60);

  state.p1.x = p1x;
  state.p1.y = getTerrainY(p1x) - PLAYER_RADIUS;
  state.p2.x = p2x;
  state.p2.y = getTerrainY(p2x) - PLAYER_RADIUS;

  // Reset lives each new terrain
  if (state.round === 1) {
    state.p1.lives = 3;
    state.p2.lives = 3;
  }
}

function generateWind() {
  const speed = (Math.random() - 0.5) * 8;
  state.wind = Math.round(speed * 10) / 10;
  const arrow = state.wind > 0 ? '→' : state.wind < 0 ? '←' : '·';
  document.getElementById('wind-val').textContent = Math.abs(state.wind).toFixed(1) + ' ' + arrow;
}

// ============================================================
// PHYSICS
// ============================================================
function simulateShot(angle, speed, startX, startY, player) {
  const rad = angle * Math.PI / 180;
  const vx0 = Math.cos(rad) * speed;
  const vy0 = -Math.sin(rad) * speed; // negative = up in screen coords

  let x = startX;
  let y = startY;
  let vx = vx0;
  let vy = vy0;
  const trail = [];
  const dt = 0.3;
  let landed = false;
  let steps = 0;
  let maxH = startY;
  let flightTime = 0;

  // Calculate target position for the OTHER player
  const target = player === 1 ? state.p2 : state.p1;
  const targetDist = Math.abs(target.x - startX);

  while (steps < 400 && !landed) {
    vy += G * dt;
    vx += state.wind * dt * 1.2;
    x += vx * dt;
    y += vy * dt;
    flightTime += dt;
    steps++;

    if (y < maxH) maxH = y;
    if (y > H) { landed = true; y = H; }

    // Check terrain collision
    const ty = getTerrainY(x);
    if (y >= ty) {
      landed = true;
      y = ty;
    }

    // Check off-screen
    if (x < -20 || x > W + 20) { landed = true; break; }

    trail.push({ x, y });

    if (y > H) break;
  }

  // Calculate flat-range equivalent
  const rangeFlat = (speed * speed * Math.sin(2 * rad)) / G;

  // Determine if hit
  const impactX = trail.length > 0 ? trail[trail.length - 1].x : x;
  const impactY = trail.length > 0 ? trail[trail.length - 1].y : (landed ? getTerrainY(x) : y);
  const distToTarget = Math.abs(impactX - target.x);
  const distToTargetY = Math.abs(impactY - target.y);
  const isDirectHit = distToTarget < IMPACT_RADIUS && distToTargetY < IMPACT_RADIUS + 10;

  // Proximity (how close in x)
  const proxX = Math.abs(impactX - target.x);

  return {
    trail, impactX, impactY, isDirectHit, proxX, distToTarget,
    flightTime: Math.round(flightTime * 10) / 10,
    maxHeight: Math.round((startY - maxH) * 10) / 10,
    rangeFlat: Math.round(rangeFlat)
  };
}

// ============================================================
// RENDER
// ============================================================
function drawGround() {
  const pts = state.terrain;
  if (!pts || pts.length < 2) return;

  ctx.save();

  // Fill terrain
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i].x, pts[i].y);
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();

  // Ground gradient
  const grad = ctx.createLinearGradient(0, H * 0.4, 0, H);
  grad.addColorStop(0, '#2a4032');
  grad.addColorStop(0.3, '#1e3025');
  grad.addColorStop(1, '#141f18');
  ctx.fillStyle = grad;
  ctx.fill();

  // Dirt texture (subtle)
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * W;
    const y = getTerrainY(x) + 2 + Math.random() * 30;
    ctx.fillStyle = `rgba(60,50,40,${0.05 + Math.random() * 0.08})`;
    ctx.fillRect(x, y, 1 + Math.random() * 2, 1 + Math.random() * 2);
  }

  // Surface line
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) {
    // Slight organic curve
    const midX = (pts[i-1].x + pts[i].x) / 2;
    const midY = (pts[i-1].y + pts[i].y) / 2;
    ctx.quadraticCurveTo(pts[i-1].x + (pts[i].x - pts[i-1].x) * 0.5, pts[i-1].y, pts[i].x, pts[i].y);
  }
  ctx.strokeStyle = '#5a7a5a';
  ctx.lineWidth = 2.5;
  ctx.stroke();

  // Highlight edge
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y - 0.5);
  for (let i = 1; i < pts.length; i++) {
    ctx.lineTo(pts[i].x, pts[i].y - 0.5);
  }
  ctx.strokeStyle = 'rgba(180,220,160,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

function drawPlayer(p, num, isCurrent) {
  const color = num === 1 ? '#64b4ff' : '#ff6464';
  const glow = isCurrent ? `0 0 12px ${color}66` : 'none';

  ctx.save();
  ctx.shadowBlur = isCurrent ? 8 : 0;
  ctx.shadowColor = color;

  // Body
  ctx.beginPath();
  ctx.arc(p.x, p.y, PLAYER_RADIUS, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(num, p.x, p.y);

  // Lives
  const hearts = num === 1 ? '🔵'.repeat(p.lives) : '🔴'.repeat(p.lives);
  ctx.font = '9px sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.fillText(hearts, p.x, p.y - PLAYER_RADIUS - 8);

  // Label
  ctx.font = '10px sans-serif';
  ctx.fillStyle = color;
  ctx.textBaseline = 'top';
  ctx.fillText('P' + num, p.x, p.y + PLAYER_RADIUS + 4);

  ctx.restore();
}

function drawCannon(x, y, angle, isP1) {
  const rad = angle * Math.PI / 180;
  const len = 28;
  const ex = x + Math.cos(-rad + Math.PI/2) * len;
  const ey = y + Math.sin(-rad + Math.PI/2) * len;
  const color = isP1 ? '#64b4ff' : '#ff6464';

  ctx.save();
  ctx.strokeStyle = color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 6;
  ctx.shadowColor = color + '44';
  ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(ex, ey); ctx.stroke();

  // Barrel highlight
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x + 1, y - 1); ctx.lineTo(ex + 1, ey - 1); ctx.stroke();

  ctx.shadowBlur = 0;

  // Angle arc indicator
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 4]);
  ctx.beginPath();
  ctx.arc(x, y, 22, -rad, 0);
  ctx.stroke();
  ctx.setLineDash([]);

  // Angle label
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(angle + '°', x + 30, y - 16);

  ctx.restore();
}

function drawTrail() {
  if (!state.trail || state.trail.length < 2) return;
  ctx.save();

  const color = state.currentPlayer === 1 ? '#64b4ff' : '#ff6464';

  // Trail glow
  for (let i = 1; i < state.trail.length; i++) {
    const t = i / state.trail.length;
    const w = 1 + t * 2.5;
    const a = 0.3 + t * 0.5;
    ctx.strokeStyle = color;
    ctx.globalAlpha = a;
    ctx.lineWidth = w;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(state.trail[i-1].x, state.trail[i-1].y);
    ctx.lineTo(state.trail[i].x, state.trail[i].y);
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawExplosion(x, y) {
  ctx.save();
  const color = state.currentPlayer === 1 ? '#64b4ff' : '#ff6464';

  // Blast circle
  const grad = ctx.createRadialGradient(x, y, 0, x, y, IMPACT_RADIUS);
  grad.addColorStop(0, 'rgba(255,255,255,0.6)');
  grad.addColorStop(0.3, color + '99');
  grad.addColorStop(0.6, color + '44');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, IMPACT_RADIUS, 0, Math.PI * 2);
  ctx.fill();

  // Debris dots
  for (let i = 0; i < 15; i++) {
    const a = Math.random() * Math.PI * 2;
    const r = 5 + Math.random() * 12;
    const dx = x + Math.cos(a) * r;
    const dy = y + Math.sin(a) * r;
    ctx.fillStyle = `rgba(180,160,120,${0.1 + Math.random() * 0.2})`;
    ctx.beginPath();
    ctx.arc(dx, dy, 1 + Math.random() * 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawImpactMarker() {
  if (!state.lastImpact) return;
  const { x, y, isHit } = state.lastImpact;
  ctx.save();

  if (isHit) {
    // Star burst for hit
    const color = state.currentPlayer === 1 ? '#ffd700' : '#ffd700';
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ffd700';
    const rays = 20;
    for (let i = 0; i < rays; i++) {
      const a = (i / rays) * Math.PI * 2;
      const r1 = 6 + Math.random() * 4;
      const r2 = 14 + Math.random() * 10;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(a) * r1, y + Math.sin(a) * r1);
      ctx.lineTo(x + Math.cos(a) * r2, y + Math.sin(a) * r2);
      ctx.stroke();
    }
    // Hit circle
    ctx.beginPath();
    ctx.arc(x, y, 18, 0, Math.PI * 2);
    ctx.strokeStyle = '#ffd700';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  } else {
    // Impact crater (gray)
    ctx.strokeStyle = 'rgba(200,200,180,0.3)';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3,4]);
    ctx.beginPath();
    ctx.arc(x, y, 12, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);

    // Proximity cross
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(x - 5, y); ctx.lineTo(x + 5, y);
    ctx.moveTo(x, y - 5); ctx.lineTo(x, y + 5);
    ctx.stroke();
  }

  ctx.restore();
}

function drawHUD() {
  ctx.save();

  // Wind indicator
  const wx = W / 2;
  const wy = 16;
  const windStr = state.wind;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.font = '10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('💨 Wind: ' + Math.abs(windStr).toFixed(1) + (windStr > 0 ? ' →' : windStr < 0 ? ' ←' : ' ·'), wx, wy);

  // Round indicator
  ctx.textAlign = 'right';
  ctx.fillText('Round ' + state.round, W - 10, wy);

  ctx.restore();
}

function render() {
  // Background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#121f17');
  bgGrad.addColorStop(0.4, '#1a2d20');
  bgGrad.addColorStop(0.7, '#1e3025');
  bgGrad.addColorStop(1, '#141f18');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Subtle stars in sky
  for (let i = 0; i < 40; i++) {
    ctx.fillStyle = `rgba(255,255,255,${0.02 + Math.random() * 0.06})`;
    ctx.fillRect(Math.random() * W, Math.random() * H * 0.3, 1, 1);
  }

  drawGround();
  drawTrail();
  drawPlayer(state.p1, 1, state.currentPlayer === 1 && state.phase === 'aiming');
  drawPlayer(state.p2, 2, state.currentPlayer === 2 && state.phase === 'aiming');

  // Draw cannons for current player
  if (state.phase === 'aiming') {
    const p = state.currentPlayer === 1 ? state.p1 : state.p2;
    drawCannon(p.x, p.y, p.angle, state.currentPlayer === 1);
  }

  drawImpactMarker();
  drawHUD();
}

// ============================================================
// GAME LOGIC
// ============================================================

function fire() {
  if (state.phase !== 'aiming') return;

  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  const startX = p.x;
  const startY = p.y - 2;

  state.phase = 'firing';

  const result = simulateShot(p.angle, p.speed, startX, startY, state.currentPlayer);
  state.shell = result;
  state.trail = result.trail;
  state.lastImpact = null;

  render();
  drawTrail();
  drawExplosion(result.impactX, result.impactY);

  // Update geometry panel
  updateGeoPanel(result);

  // Record history
  const playerColor = state.currentPlayer === 1 ? '#64b4ff' : '#ff6464';
  state.history.unshift({
    player: state.currentPlayer,
    angle: p.angle,
    speed: p.speed,
    prox: Math.round(result.proxX),
    hit: result.isDirectHit
  });
  updateHistory();

  // Show result
  setTimeout(() => {
    state.lastImpact = { x: result.impactX, y: result.impactY, isHit: result.isDirectHit };
    state.phase = 'result';
    render();

    if (result.isDirectHit) {
      // HIT!
      const loser = state.currentPlayer === 1 ? 2 : 1;
      if (state.currentPlayer === 1) {
        state.p2.lives--;
      } else {
        state.p1.lives--;
      }

      const winTitle = '🎯 DIRECT HIT!';
      const winBody = `Player ${state.currentPlayer} nailed it!`;
      let proxStr = '';

      if (state.currentPlayer === 1 ? state.p2.lives <= 0 : state.p1.lives <= 0) {
        // Game over
        proxStr = '💀 Fatal strike!';
        if (state.currentPlayer === 1) state.p1Wins++;
        else state.p2Wins++;
        document.getElementById('p1-wins').textContent = state.p1Wins;
        document.getElementById('p2-wins').textContent = state.p2Wins;
        showResult(winTitle, winBody + ' 🏆 Game Over!', proxStr, true);
        state.phase = 'gameover';
      } else {
        proxStr = `${loser === 1 ? 'P1' : 'P2'} has ${loser === 1 ? state.p1.lives : state.p2.lives} lives remaining`;
        showResult(winTitle, winBody, proxStr, true);
      }
    } else {
      // MISS — show proximity
      const dir = result.impactX < (state.currentPlayer === 1 ? state.p2.x : state.p1.x) ? 'SHORT' : 'LONG';
      const proxStr = `${dir} by ${Math.round(result.proxX)}px — Angle: ${p.angle}°  Speed: ${p.speed}`;

      const hint = [];
      if (Math.abs(result.proxX) > 60) {
        if (result.impactX < (state.currentPlayer === 1 ? state.p2.x : state.p1.x)) {
          hint.push('Try a HIGHER angle or more speed');
        } else {
          hint.push('Try a LOWER angle or less speed');
        }
      } else {
        hint.push('Close! Fine-tune by ±2°');
      }
      if (Math.abs(state.wind) > 1) {
        const windDir = state.wind > 0 ? 'right' : 'left';
        hint.push(`Wind (${windDir}) affected your shot`);
      }

      showResult('📉 MISS', proxStr, hint.join(' · '), false);
    }

    // Switch player
    state.currentPlayer = state.currentPlayer === 1 ? 2 : 1;
    updateTurnDisplay();
  }, 800);
}

function showResult(title, body, prox, isHit) {
  document.getElementById('r-title').textContent = title;
  document.getElementById('r-title').style.color = isHit ? '#ffd700' : '#d4d0b8';
  document.getElementById('r-body').textContent = body;
  document.getElementById('r-prox').textContent = prox || '';
  document.getElementById('result').style.display = 'block';
}

function dismissResult() {
  document.getElementById('result').style.display = 'none';

  if (state.phase === 'gameover') {
    startNewRound();
    return;
  }

  // Switch to next player's aiming phase
  state.phase = 'aiming';
  state.trail = [];
  render();

  // Update controls for new player
  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  document.getElementById('angle-slider').value = p.angle;
  document.getElementById('angle-display').textContent = p.angle + '°';
  document.getElementById('speed-slider').value = p.speed;
  document.getElementById('speed-display').textContent = p.speed;

  document.getElementById('fire-btn').disabled = false;
  showMessage(`Player ${state.currentPlayer}'s turn — set your angle and speed`);
}

function startNewRound() {
  state.round++;
  state.phase = 'aiming';
  state.trail = [];
  state.lastImpact = null;
  state.history = [];

  // Reset lives if someone hit zero
  if (state.p1.lives <= 0 || state.p2.lives <= 0) {
    state.p1.lives = 3;
    state.p2.lives = 3;
  }

  generateTerrain();
  generateWind();
  placePlayers();

  state.currentPlayer = Math.random() < 0.5 ? 1 : 2;
  state.p1.angle = Math.round((45 + (Math.random() - 0.5) * 20) * 2) / 2;
  state.p1.speed = Math.round(45 + Math.random() * 15);
  state.p2.angle = Math.round((45 + (Math.random() - 0.5) * 20) * 2) / 2;
  state.p2.speed = Math.round(45 + Math.random() * 15);

  document.getElementById('history').style.display = 'block';
  document.getElementById('hist-entries').innerHTML = '';

  updateTurnDisplay();
  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  document.getElementById('angle-slider').value = p.angle;
  document.getElementById('angle-display').textContent = p.angle + '°';
  document.getElementById('speed-slider').value = p.speed;
  document.getElementById('speed-display').textContent = p.speed;
  document.getElementById('fire-btn').disabled = false;
  document.getElementById('result').style.display = 'none';

  render();
  showMessage(`🌄 New round! Player ${state.currentPlayer} fires first`);
}

function updateTurnDisplay() {
  const el = document.getElementById('turn-display');
  if (state.currentPlayer === 1) {
    el.textContent = '🔵 Player 1\'s Turn';
    el.className = 'turn-p1';
  } else {
    el.textContent = '🔴 Player 2\'s Turn';
    el.className = 'turn-p2';
  }
}

function updateGeoPanel(result) {
  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  const target = state.currentPlayer === 1 ? state.p2 : state.p1;
  const targetDist = Math.abs(target.x - p.x);

  document.getElementById('gp-angle').textContent = p.angle + '°';
  document.getElementById('gp-speed').textContent = p.speed + ' m/s';
  document.getElementById('gp-time').textContent = (result.flightTime || '--') + 's';
  document.getElementById('gp-height').textContent = (result.maxHeight || '--') + 'm';
  document.getElementById('gp-range').textContent = (result.rangeFlat || '--') + 'm';
  document.getElementById('gp-target-dist').textContent = Math.round(targetDist * (300/W)) + 'm';
}

function updateHistory() {
  const el = document.getElementById('hist-entries');
  el.innerHTML = state.history.slice(0, 6).map(h =>
    `<div class="hist-entry" style="color:${h.player === 1 ? '#64b4ff' : '#ff6464'}">
      P${h.player}: ${h.angle}° @ ${h.speed} ${h.hit ? '🎯' : '~' + h.prox + 'px'}
    </div>`
  ).join('');
}

function showMessage(text) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 3500);
}

// ============================================================
// CONTROLS
// ============================================================

document.getElementById('angle-slider').addEventListener('input', (e) => {
  if (state.phase !== 'aiming') return;
  const val = Math.round(parseFloat(e.target.value) * 10) / 10;
  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  p.angle = val;
  document.getElementById('angle-display').textContent = val + '°';
  document.getElementById('angle-display').style.color = state.currentPlayer === 1 ? '#64b4ff' : '#ff6464';
  render();
});

document.getElementById('speed-slider').addEventListener('input', (e) => {
  if (state.phase !== 'aiming') return;
  const val = parseFloat(e.target.value);
  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  p.speed = val;
  document.getElementById('speed-display').textContent = val;
  document.getElementById('speed-display').style.color = state.currentPlayer === 1 ? '#64b4ff' : '#ff6464';
});

document.getElementById('fire-btn').addEventListener('click', fire);
document.getElementById('r-ok-btn').addEventListener('click', dismissResult);
document.getElementById('new-game-btn').addEventListener('click', startNewRound);

// Geometry panel
document.getElementById('geo-help').addEventListener('click', () => {
  const panel = document.getElementById('geo-panel');
  state.showGeo = !state.showGeo;
  panel.style.display = state.showGeo ? 'block' : 'none';
});
document.getElementById('gp-close-btn').addEventListener('click', () => {
  document.getElementById('geo-panel').style.display = 'none';
  state.showGeo = false;
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  const key = e.key;

  if (key === 'Enter' || key === ' ') {
    e.preventDefault();
    if (state.phase === 'aiming') fire();
    else if (state.phase === 'result' || state.phase === 'gameover') dismissResult();
    return;
  }

  if (state.phase !== 'aiming') return;

  switch (key) {
    case 'ArrowUp':
      e.preventDefault();
      adjustAngle(1);
      break;
    case 'ArrowDown':
      e.preventDefault();
      adjustAngle(-1);
      break;
    case 'ArrowRight':
      e.preventDefault();
      adjustSpeed(2);
      break;
    case 'ArrowLeft':
      e.preventDefault();
      adjustSpeed(-2);
      break;
  }
});

function adjustAngle(delta) {
  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  p.angle = Math.round(Math.max(1, Math.min(89, p.angle + delta)) * 2) / 2;
  document.getElementById('angle-slider').value = p.angle;
  document.getElementById('angle-display').textContent = p.angle + '°';
  render();
}

function adjustSpeed(delta) {
  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  p.speed = Math.max(10, Math.min(100, p.speed + delta));
  document.getElementById('speed-slider').value = p.speed;
  document.getElementById('speed-display').textContent = p.speed;
}

// Canvas click to set angle visually
canvas.addEventListener('click', (e) => {
  if (state.phase !== 'aiming') return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  const mx = (e.clientX - rect.left) * scaleX;

  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  // Clicking to the right of player = angle reference
  const dx = mx - p.x;
  if (Math.abs(dx) > 50) {
    // Simple visual reference: don't auto-set angle, just hint
  }
});

// Resize
function resizeCanvas() {
  const app = document.getElementById('app');
  const rect = app.getBoundingClientRect();
  const aspect = W / H;
  let cw = rect.width - 4;
  let ch = cw / aspect;
  if (ch > window.innerHeight * 0.7) {
    ch = window.innerHeight * 0.7;
    cw = ch * aspect;
  }
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
}
window.addEventListener('resize', resizeCanvas);

// ============================================================
// INIT
// ============================================================
function init() {
  resizeCanvas();
  generateTerrain();
  generateWind();
  placePlayers();

  state.currentPlayer = Math.random() < 0.5 ? 1 : 2;
  state.p1.angle = Math.round((45 + (Math.random() - 0.5) * 20) * 2) / 2;
  state.p1.speed = Math.round(45 + Math.random() * 15);
  state.p2.angle = Math.round((45 + (Math.random() - 0.5) * 20) * 2) / 2;
  state.p2.speed = Math.round(45 + Math.random() * 15);

  const p = state.currentPlayer === 1 ? state.p1 : state.p2;
  document.getElementById('angle-slider').value = p.angle;
  document.getElementById('angle-display').textContent = p.angle + '°';
  document.getElementById('speed-slider').value = p.speed;
  document.getElementById('speed-display').textContent = p.speed;

  updateTurnDisplay();
  render();
  document.getElementById('history').style.display = 'block';

  document.getElementById('geo-help').style.display = 'block';

  setTimeout(() => {
    showMessage(`🎯 Player ${state.currentPlayer} — set your ANGLE and SPEED, then FIRE!`);
  }, 300);

  console.log('🎯 Angle of Attack loaded!');
  console.log('↑↓=Angle  ←→=Speed  Enter/Space=Fire');
}

init();
</script>
